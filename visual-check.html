<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>askr-themes component audit</title>
    <link rel="stylesheet" href="./src/themes/default/index.css" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: var(--ak-font-family-body);
        color: var(--ak-color-text);
        background: var(--ak-color-bg);
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      .audit-page {
        display: grid;
        gap: clamp(1.25rem, 1rem + 1vw, 2rem);
        max-inline-size: 96rem;
        margin-inline: auto;
        padding: clamp(1rem, 0.8rem + 1.4vw, 2rem);
      }

      .hero {
        display: grid;
        gap: 1rem;
        padding: clamp(1.25rem, 1rem + 1.4vw, 2rem);
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-xl);
        background: color-mix(in srgb, var(--ak-color-surface) 94%, transparent);
        box-shadow: var(--ak-shadow-sm);
      }

      .hero-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 1.6fr) minmax(18rem, 0.9fr);
        align-items: start;
      }

      .hero-copy {
        display: grid;
        gap: 0.75rem;
      }

      .hero h1 {
        font-size: clamp(2.2rem, 1.55rem + 2.4vw, 3.75rem);
        line-height: 1;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .hero-lead {
        max-inline-size: 64ch;
        color: var(--ak-color-text-muted);
        line-height: 1.65;
      }

      .hero-asides {
        display: grid;
        gap: 0.75rem;
      }

      .hero-tile {
        display: grid;
        gap: 0.35rem;
        padding: 0.9rem 1rem;
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-lg);
        background: var(--ak-color-surface-muted);
      }

      .hero-tile strong {
        font-size: var(--ak-font-size-sm);
      }

      .hero-tile p {
        color: var(--ak-color-text-muted);
        font-size: var(--ak-font-size-sm);
        line-height: 1.5;
      }

      .section-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .section-nav a {
        display: inline-flex;
        align-items: center;
        min-height: 2rem;
        padding: 0 0.8rem;
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: 999px;
        background: var(--ak-color-surface);
        color: var(--ak-color-text-muted);
        font-size: var(--ak-font-size-sm);
        text-decoration: none;
        transition:
          background var(--ak-duration-fast) var(--ak-ease-standard),
          border-color var(--ak-duration-fast) var(--ak-ease-standard),
          color var(--ak-duration-fast) var(--ak-ease-standard),
          box-shadow var(--ak-duration-fast) var(--ak-ease-standard);
      }

      .section-nav a:hover {
        background: var(--ak-color-surface-muted);
        border-color: var(--ak-color-border);
        color: var(--ak-color-text);
      }

      .section-nav a:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 1px var(--ak-color-surface),
          0 0 0 calc(var(--ak-focus-ring-width) + 1px) var(--ak-color-focus-ring);
      }

      .section {
        display: grid;
        gap: 0.875rem;
      }

      .section-head {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        justify-content: space-between;
        gap: 0.75rem;
        padding-block-end: 0.25rem;
        border-block-end: 1px solid var(--ak-color-border-subtle);
      }

      .section-head h2 {
        font-size: var(--ak-type-5-size);
        line-height: var(--ak-type-5-line-height);
      }

      .section-head p {
        max-inline-size: 68ch;
        color: var(--ak-color-text-muted);
        line-height: 1.55;
      }

      .component-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 30rem), 1fr));
      }

      .component-card {
        display: grid;
        gap: 1rem;
        padding: 1rem;
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-lg);
        background: color-mix(in srgb, var(--ak-color-surface) 96%, transparent);
        box-shadow: var(--ak-shadow-sm);
      }

      .component-card[data-span="full"] {
        grid-column: 1 / -1;
      }

      .component-card-head {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .component-card-head h3 {
        font-size: var(--ak-font-size-lg);
        line-height: 1.2;
      }

      .component-note {
        max-inline-size: 58ch;
        margin-top: 0.25rem;
        color: var(--ak-color-text-muted);
        line-height: 1.5;
      }

      .preview-grid {
        display: grid;
        gap: 0.875rem;
      }

      .preview-grid[data-layout="split"] {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      @media (max-width: 54rem) {
        .preview-grid[data-layout="split"] {
          grid-template-columns: 1fr;
        }
      }

      .preview {
        display: grid;
        gap: 0.75rem;
        padding: 0.75rem;
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-lg);
        background: var(--ak-color-bg);
        box-shadow: inset 0 0 0 1px
          color-mix(in srgb, var(--ak-color-border-subtle) 48%, transparent);
      }

      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        color: var(--ak-color-text-muted);
        font-size: var(--ak-font-size-xs);
        font-weight: var(--ak-font-weight-semibold);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .preview-tag {
        display: inline-flex;
        align-items: center;
        min-height: 1.7rem;
        padding: 0 0.65rem;
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: 999px;
        background: var(--ak-color-surface);
        color: var(--ak-color-text-muted);
        font-size: var(--ak-font-size-xs);
        letter-spacing: 0.04em;
        text-transform: none;
      }

      .preview-surface {
        display: grid;
        gap: 0.9rem;
        overflow: hidden;
        padding: var(--ak-layout-panel-padding);
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-lg);
        background: var(--ak-color-surface);
        color: var(--ak-color-text);
        box-shadow: var(--ak-shadow-sm);
        min-inline-size: 0;
      }

      .quality-list {
        display: grid;
        gap: 0.45rem;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .quality-list li {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        color: var(--ak-color-text-muted);
        font-size: var(--ak-font-size-sm);
      }

      .quality-list li::before {
        content: "";
        flex: none;
        inline-size: 0.4rem;
        block-size: 0.4rem;
        border-radius: var(--ak-radius-round);
        background: var(--ak-color-primary);
      }

      .stack {
        display: grid;
        gap: 0.75rem;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        min-inline-size: 0;
      }

      .field {
        display: grid;
        gap: 0.45rem;
        min-inline-size: 0;
      }

      .mini-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 12.5rem), 1fr));
        min-inline-size: 0;
      }

      .mini-grid > * {
        min-inline-size: 0;
      }

      .layout-demo {
        min-block-size: 12rem;
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-lg);
        overflow: hidden;
        background: var(--ak-color-surface);
      }

      .layout-shell {
        min-inline-size: 0;
        grid-template-columns: minmax(0, 1fr);
      }

      .layout-shell > * {
        min-inline-size: 0;
      }

      @media (min-width: 32rem) {
        .layout-shell {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .layout-sidebar {
        display: grid;
        gap: var(--ak-space-xs);
        padding: var(--ak-space-md);
        background: var(--ak-color-surface-muted);
      }

      .layout-main {
        display: grid;
        gap: var(--ak-space-sm);
        padding: var(--ak-space-md);
      }

      .long-label {
        max-inline-size: 100%;
        overflow-wrap: anywhere;
      }

      .mobile-frame {
        inline-size: min(100%, 20rem);
        min-inline-size: 0;
        margin-inline: auto;
      }

      .mobile-frame-surface {
        display: grid;
        gap: var(--ak-space-md);
        inline-size: 100%;
        min-inline-size: 0;
        padding: var(--ak-space-md);
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-lg);
        background: var(--ak-color-bg);
        overflow: hidden;
      }

      .wide-table {
        inline-size: 100%;
      }

      .mobile-drawer-demo {
        position: relative;
        min-block-size: 16rem;
        border: 1px solid var(--ak-color-border-subtle);
        border-radius: var(--ak-radius-lg);
        overflow: hidden;
        background: var(--ak-color-bg);
      }

      .mobile-drawer-demo [data-slot="sidebar-panel"],
      .mobile-drawer-demo [data-slot="navbar-panel"] {
        position: static;
        inline-size: 100%;
        max-block-size: 14rem;
      }

      .audit-page :where(.btn, [data-slot="button"]) {
        max-inline-size: 100%;
      }

      .audit-page :where([data-slot="toast"]) {
        animation: none;
        min-inline-size: 0;
      }

      .mini-label {
        color: var(--ak-color-text-muted);
        font-size: var(--ak-font-size-xs);
        font-weight: var(--ak-font-weight-semibold);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .slider-demo {
        display: grid;
        gap: 0.35rem;
      }

      .compact-table-wrap {
        overflow: hidden;
        border-radius: var(--ak-radius-lg);
      }

      @media (max-width: 64rem) {
        .hero-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="audit-page" id="audit-root"></main>
    <script type="module">
      const renderRow = (items) => `<div class="row">${items.join("")}</div>`;
      const renderButton = (className, label, attrs = "") =>
        `<button class="${className}" data-slot="button" ${attrs}>${label}</button>`;
      const renderBadge = (label, attrs = "") =>
        `<span class="badge" data-slot="badge" ${attrs}>${label}</span>`;
      const renderField = (label, control, meta = "") => `
        <div class="field" data-slot="field">
          <label class="label" data-slot="label">${label}</label>
          ${control}
          ${meta}
        </div>`;
      const renderToast = (variant, title, description, action) => `
        <div data-slot="toast" data-variant="${variant}">
          <strong data-slot="toast-title">${title}</strong>
          <p data-slot="toast-description">${description}</p>
          <div class="row">
            <button data-slot="toast-action">${action}</button>
            <button data-slot="toast-close" aria-label="Dismiss">x</button>
          </div>
        </div>`;

      const badgeVariantsMarkup = [
        renderBadge("Default"),
        renderBadge("Secondary", 'data-variant="secondary"'),
        renderBadge("Success", 'data-variant="success"'),
        renderBadge("Warning", 'data-variant="warning"'),
        renderBadge("Danger", 'data-variant="danger"'),
        renderBadge("Info", 'data-variant="info"'),
      ].join("");

      const resilienceContent = `
        <div class="stack">
          <div class="row">
            <span class="badge" data-slot="badge" data-variant="info">
              <svg data-slot="icon" viewBox="0 0 16 16" aria-hidden="true">
                <circle cx="8" cy="8" r="5" fill="currentColor"></circle>
              </svg>
              Status with icon
            </span>
            <span class="badge" data-slot="badge" data-variant="secondary">
              Long badge label that wraps without forcing overflow
            </span>
            <div data-slot="progress-circle" data-state="indeterminate"></div>
          </div>
          <div class="alert" data-slot="alert" data-variant="warning">
            <div class="alert-icon" data-slot="alert-icon">!</div>
            <div class="alert-content" data-slot="alert-content">
              <h4 class="alert-title" data-slot="alert-title">
                Exceptionally long alert title that still needs to wrap cleanly on mobile
              </h4>
              <p class="alert-description" data-slot="alert-description">
                Alert copy can include a long deployment identifier like
                production-north-america-control-plane-reconciliation-job without clipping.
              </p>
            </div>
            <button class="btn btn-close alert-close" data-slot="alert-close" aria-label="Dismiss">x</button>
          </div>
          <section class="empty-state" data-slot="empty-state">
            <div class="empty-state-icon" data-slot="empty-state-icon">0</div>
            <h4 class="empty-state-title" data-slot="empty-state-title">
              No matching records for the selected operational filters
            </h4>
            <p class="empty-state-description" data-slot="empty-state-description">
              Try a shorter date range or remove one segment to see whether records reappear.
            </p>
            <div class="empty-state-actions" data-slot="empty-state-actions">
              <button class="btn btn-primary" data-slot="button">Reset filters</button>
              <button class="btn btn-outline" data-slot="button">Save view</button>
            </div>
          </section>
          <div data-slot="aspect-ratio" style="aspect-ratio: 21 / 9;">
            <div style="display:grid;place-items:center;inline-size:100%;block-size:100%;background:var(--ak-color-surface-muted);">
              Responsive media wrapper
            </div>
          </div>
        </div>`;

      const buttonsContent = `
        <div class="stack">
          ${renderRow([
            renderButton("btn btn-primary", "Primary", 'data-variant="primary"'),
            renderButton("btn btn-secondary", "Secondary", 'data-variant="secondary"'),
            renderButton("btn btn-outline", "Outline", 'data-variant="outline"'),
            renderButton("btn btn-ghost", "Ghost", 'data-variant="ghost"'),
            renderButton("btn btn-destructive", "Delete", 'data-variant="destructive"'),
            renderButton("btn btn-link", "Link", 'data-variant="link"'),
          ])}
          ${renderRow([
            renderButton("btn btn-sm", "Small", 'data-size="sm"'),
            renderButton("btn", "Default"),
            renderButton("btn btn-lg", "Large", 'data-size="lg"'),
            '<button class="btn btn-icon" data-slot="button" data-size="icon" aria-label="Icon">i</button>',
            '<button class="btn" data-slot="button" data-disabled disabled>Disabled</button>',
          ])}
          ${renderRow([
            renderButton(
              "btn btn-outline long-label",
              "Long enterprise action label that should wrap without breaking alignment",
              'data-variant="outline"',
            ),
          ])}
        </div>`;

      const togglesContent = `
        <div class="stack">
          ${renderRow([
            '<button data-slot="toggle">Off</button>',
            '<button data-slot="toggle" data-state="on">On</button>',
            '<button data-slot="toggle" data-disabled>Disabled</button>',
          ])}
          <div data-slot="toggle-group" aria-label="Density">
            <button data-slot="toggle-group-item" data-state="on">Compact</button>
            <button data-slot="toggle-group-item">Cozy</button>
            <button data-slot="toggle-group-item" data-disabled>Disabled</button>
          </div>
          <button data-slot="collapsible-trigger" data-disabled>Disabled disclosure</button>
        </div>`;

      const shellContent = `
        <div class="stack">
          <nav data-slot="breadcrumb" aria-label="Breadcrumb">
            <ol data-slot="breadcrumb-list">
              <li data-slot="breadcrumb-item"><a data-slot="breadcrumb-link" href="#">Home</a></li>
              <li data-slot="breadcrumb-separator">/</li>
              <li data-slot="breadcrumb-item"><a data-slot="breadcrumb-link" href="#">Admin</a></li>
              <li data-slot="breadcrumb-separator">/</li>
              <li data-slot="breadcrumb-current">Components</li>
            </ol>
          </nav>
          <header class="header" data-slot="header">
            <nav class="navbar" data-slot="navbar" data-orientation="horizontal" data-responsive-collapsed="false">
              <div class="navbar-shell" data-slot="navbar-shell">
                <div class="navbar-brand" data-slot="navbar-brand">
                  <a href="#">
                    <span data-slot="icon" aria-hidden="true">A</span>
                    <strong>Askr Production Workspace</strong>
                  </a>
                </div>
                <div class="navbar-group" data-slot="navbar-group" data-align="center">
                  <a class="navbar-item" data-slot="nav-item" href="#" aria-current="page">
                    <span>Components</span>
                  </a>
                  <a class="navbar-item" data-slot="nav-item" href="#">
                    <span>Usage analytics</span>
                  </a>
                  <a class="navbar-item" data-slot="nav-item" href="#">
                    <span>Long documentation destination</span>
                  </a>
                </div>
                <div class="navbar-group" data-slot="navbar-group" data-align="end">
                  <button class="btn btn-ghost btn-icon" data-slot="button" data-size="icon" aria-label="Theme">
                    Aa
                  </button>
                </div>
              </div>
            </nav>
          </header>
          <nav class="nav" data-slot="nav" data-variant="tabs" aria-label="Tabs">
            <a class="nav-item" data-slot="nav-link" href="#" aria-current="page">Overview</a>
            <a class="nav-item" data-slot="nav-link" href="#">Usage</a>
            <a class="nav-item" data-slot="nav-link" href="#">API</a>
          </nav>
          <nav class="nav" data-slot="nav" data-variant="pills" aria-label="Pills">
            <a class="nav-item" data-slot="nav-link" href="#" data-active="true">Open</a>
            <a class="nav-item" data-slot="nav-link" href="#">Queued</a>
            <a class="nav-item" data-slot="nav-link" href="#">Done</a>
          </nav>
        </div>`;

      const layoutContent = `
        <div class="stack">
          <div class="layout-demo">
            <div data-slot="block" data-columns="initial:2" class="layout-shell">
              <aside class="layout-sidebar sidebar" data-slot="sidebar" data-responsive-collapsed="false">
                <div class="sidebar-shell" data-slot="sidebar-shell" data-orientation="vertical">
                  <div data-slot="navbar-brand">
                    <a href="#">
                      <span data-slot="icon" aria-hidden="true">A</span>
                      <strong>Askr Production Workspace</strong>
                    </a>
                  </div>
                  <div data-slot="navbar-group">
                    <span data-slot="navbar-group-label">Operations and reporting</span>
                    <div data-slot="navbar-group-body">
                      <a class="nav-item" data-slot="nav-link" href="#" aria-current="page">
                        <span data-slot="icon" aria-hidden="true">D</span>
                        <span>Dashboard</span>
                      </a>
                      <a class="nav-item long-label" data-slot="nav-link" href="#">
                        <span data-slot="icon" aria-hidden="true">R</span>
                        <span>A very long navigation destination name for production readiness</span>
                      </a>
                    </div>
                  </div>
                </div>
              </aside>
              <main class="layout-main">
                <div data-slot="container" data-size="initial:2">
                  <section data-slot="section" data-size="2">
                    <div data-slot="stack" data-gap="initial:2">
                      <h4>Responsive layout rhythm</h4>
                      <p>
                        Containers, sections, blocks, stacks, inline rows, and aspect-ratio wrappers
                        should keep their rhythm with realistic copy.
                      </p>
                    </div>
                  </section>
                </div>
              </main>
            </div>
          </div>
          <div data-slot="aspect-ratio" style="aspect-ratio: 16 / 9;">
            <div class="preview-surface">Aspect-ratio media frame</div>
          </div>
        </div>`;

      const mobileStressContent = `
        <div class="mobile-frame">
          <div class="mobile-frame-surface">
            <div data-slot="block" data-size="initial:xl">
              <article class="card" data-slot="card">
                <h4 class="card-title" data-slot="card-title">Large block preset inside 320px</h4>
                <p class="card-description" data-slot="card-description">
                  This should not create horizontal scroll even with the xl grid preset.
                </p>
              </article>
            </div>
            <div data-slot="radio-group" data-orientation="horizontal">
              <button data-slot="radio-group-item" data-state="checked">Daily digest</button>
              <button data-slot="radio-group-item">Weekly operational review</button>
              <button data-slot="radio-group-item">Monthly executive summary</button>
            </div>
            <div data-slot="toggle-group" aria-label="Mobile density">
              <button data-slot="toggle-group-item" data-state="on">Compact</button>
              <button data-slot="toggle-group-item">Comfortable</button>
              <button data-slot="toggle-group-item">Expanded</button>
            </div>
            <nav class="pagination" data-slot="pagination" aria-label="Mobile pagination">
              <a data-slot="pagination-link" href="#">Previous report</a>
              <a data-slot="pagination-link" data-active="true" href="#">12</a>
              <span data-slot="pagination-ellipsis">...</span>
              <a data-slot="pagination-link" href="#">Next report</a>
            </nav>
            <section data-slot="dialog-content">
              <h4 data-slot="dialog-title">Mobile dialog with a long title that wraps cleanly</h4>
              <p data-slot="dialog-description">
                Dialog content should fit the frame without requiring horizontal panning.
              </p>
              <button data-slot="dialog-close">Close</button>
            </section>
            <div class="mini-grid">
              <div data-slot="select-content">
                <button data-slot="select-item" data-state="checked">
                  Production environment with a very long deployment target name
                </button>
                <button data-slot="select-item">Preview</button>
              </div>
              <div data-slot="dropdown-content">
                <button data-slot="dropdown-item">Account settings with an intentionally long label</button>
                <button data-slot="dropdown-item">Billing</button>
              </div>
              <div data-slot="menu-content">
                <div data-slot="menu-label">Mobile submenu</div>
                <button data-slot="menu-item">Overview</button>
                <details open data-submenu="true">
                  <summary data-slot="menu-item" data-submenu-trigger="true">Archive</summary>
                  <ul data-submenu-content="true">
                    <li data-submenu-item="true">
                      <button data-slot="menu-item">Archive this very long document name</button>
                    </li>
                    <li data-submenu-item="true">
                      <button data-slot="menu-item">Archive and close</button>
                    </li>
                  </ul>
                </details>
              </div>
            </div>
            <div class="compact-table-wrap">
              <table class="wide-table" data-slot="table">
                <thead data-slot="table-head">
                  <tr data-slot="table-row">
                    <th data-slot="table-header-cell">Extremely long header label</th>
                    <th data-slot="table-header-cell">State</th>

              <div class="preview-head">
                <span>Light mode</span>
                <span class="preview-tag">light</span>
              </div>
              <div class="preview-surface">${content}</div>
            </section>
            <section class="preview" data-theme="dark">
              <div class="preview-head">
                <span>Dark mode</span>
                <span class="preview-tag">dark</span>
              </div>
              <div class="preview-surface">${content}</div>
            </section>
          </div>
        </article>`;

      const renderSection = ({ id, title, note, cards }) => `
        <section class="section" id="${id}">
          <header class="section-head">
            <div>
              <h2>${title}</h2>
              <p>${note}</p>
            </div>
          </header>
          <div class="component-grid">
            ${cards.map(renderCard).join("")}
          </div>
        </section>`;

      const hero = `
        <section class="hero">
          <div class="hero-grid">
            <div class="hero-copy">
              <p class="eyebrow">askr-themes</p>
              <h1>Component audit, one family at a time.</h1>
              <p class="hero-lead">
                Each sample is isolated so light and dark can be compared quickly, while the
                checklist keeps spacing, alignment, hierarchy, and interaction states held to the
                same quiet SaaS standard.
              </p>
            </div>
            <div class="hero-asides">
              <div class="hero-tile">
                <strong>Light + dark</strong>
                <p>Every component family is rendered twice and labeled clearly.</p>
              </div>
              <div class="hero-tile">
                <strong>Overlay surface</strong>
                <p>Dialogs, popovers, tooltips, and toasts now share the same surface token.</p>
              </div>
              <div class="hero-tile">
                <strong>Focus states</strong>
                <p>Close actions and menu-like triggers have explicit keyboard rings.</p>
              </div>
            </div>
          </div>
          <nav class="section-nav" aria-label="Jump to section">
            <a href="#foundations">Foundations</a>
            <a href="#layouts">Layouts</a>
            <a href="#mobile">Mobile</a>
            <a href="#shell">Shell</a>
            <a href="#actions">Actions</a>
            <a href="#forms">Forms</a>
            <a href="#surfaces">Surfaces</a>
            <a href="#disclosure">Disclosure</a>
            <a href="#overlays">Overlays</a>
          </nav>
        </section>`;

      document.getElementById("audit-root").innerHTML = hero + sections.map(renderSection).join("");
    </script>
  </body>
</html>
