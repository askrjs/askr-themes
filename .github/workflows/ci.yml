name: CI

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "checks/**"
      - "test-d/**"
      - "test-utils/**"
      - "tooling/**"
      - "benches/**"
      - "src/**"
      - "tests/**"
      - "*.json"
      - "*.ts"
      - "*.js"
      - ".gitattributes"
      - ".gitignore"
      - ".npmignore"
      - ".npmrc"
      - ".prettierignore"
  pull_request:
    branches: [main]
    paths:
      - ".github/**"
      - "checks/**"
      - "test-d/**"
      - "test-utils/**"
      - "tooling/**"
      - "benches/**"
      - "src/**"
      - "tests/**"
      - "*.json"
      - "*.ts"
      - "*.js"
      - ".gitattributes"
      - ".gitignore"
      - ".npmignore"
      - ".npmrc"
      - ".prettierignore"

permissions:
  contents: read

jobs:
  ci:
    name: Release Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

  browser:
    name: Browser Integration (${{ matrix.os }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium firefox webkit

      - name: Browser integration tests
        run: bun run test:browser
